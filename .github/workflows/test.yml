name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: "1.88"

jobs:
  unit-tests-linux:
    name: Unit Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxkbcommon-dev libwayland-dev libvulkan-dev libglib2.0-dev libdbus-1-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --lib

  ssh-integration-linux:
    name: SSH Integration Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxkbcommon-dev libwayland-dev libvulkan-dev libglib2.0-dev libdbus-1-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Generate test SSH keys
        run: |
          cd tests/docker/test_keys
          chmod +x generate_keys.sh
          ./generate_keys.sh

      - name: Start SSH test containers
        run: |
          cd tests/docker
          docker compose up -d --build --wait
          docker compose ps

      - name: Wait for SSH server
        run: |
          for i in {1..30}; do
            nc -z localhost 2222 && break
            echo "Waiting for SSH server... (attempt $i)"
            sleep 1
          done
          nc -z localhost 2222 || exit 1

      - name: Run SSH integration tests
        run: cargo test --test ssh_integration -- --test-threads=1
        env:
          RUST_LOG: debug

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          cd tests/docker
          docker compose logs > docker-logs.txt

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: tests/docker/docker-logs.txt

      - name: Cleanup containers
        if: always()
        run: |
          cd tests/docker
          docker compose down -v

  portal-hub-contracts:
    name: Portal Hub Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Portal
        uses: actions/checkout@v6

      - name: Checkout Portal Hub contracts
        uses: actions/checkout@v6
        with:
          repository: DigitalPals/portal-hub
          path: portal-hub

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxkbcommon-dev libwayland-dev libvulkan-dev libglib2.0-dev libdbus-1-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run contract-backed unit tests
        run: cargo test --lib
        env:
          PORTAL_HUB_CONTRACT_DIR: ${{ github.workspace }}/portal-hub/contracts/portal-hub/v2

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxkbcommon-dev libwayland-dev libvulkan-dev libglib2.0-dev libdbus-1-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: |
          # RUSTSEC-2023-0071 has no fixed rsa release. Keep this explicit so any
          # new non-ignored vulnerability still fails CI.
          cargo audit --ignore RUSTSEC-2023-0071
